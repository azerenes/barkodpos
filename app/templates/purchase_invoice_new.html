{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-plus-lg"></i> Yeni Alış Faturası</h4>
    <a href="{{ url_for('purchase.invoice_list') }}" class="btn btn-outline-secondary">Geri</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row g-2 mb-2">
                <div class="col-md-4">
                    <label>Tedarikçi</label>
                    <select name="supplier_id" class="form-select">
                        <option value="">- Seçin -</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Fatura No</label>
                    <input type="text" name="invoice_no" class="form-control" placeholder="INV001">
                </div>
                <div class="col-md-3">
                    <label>Fatura Tarihi</label>
                    <input type="date" name="invoice_date" class="form-control" value="{{ '' | date('Y-m-d') }}">
                </div>
            </div>
            <div class="mb-2">
                <label>Not</label>
                <input type="text" name="notes" class="form-control" placeholder="İsteğe bağlı not">
            </div>
            <hr>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="fw-bold">Ürünler</label>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow()"><i class="bi bi-plus"></i> Ürün Ekle</button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm" id="itemsTable">
                    <thead><tr><th>Ürün</th><th>Miktar</th><th>Birim Fiyat</th><th>Toplam</th><th></th></tr></thead>
                    <tbody id="itemsBody">
                        <tr>
                            <td>
                                <select name="product_id[]" class="form-select form-select-sm" required>
                                    <option value="">- Seçin -</option>
                                    {% for p in products %}
                                    <option value="{{ p.id }}" data-price="{{ p.purchase_price }}">{{ p.name }} ({{ p.barcode }})</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td><input type="number" name="qty[]" class="form-control form-control-sm" value="1" min="0.01" step="0.01" onchange="calcRow(this)"></td>
                            <td><input type="number" name="price[]" class="form-control form-control-sm" value="0" min="0" step="0.01" onchange="calcRow(this)"></td>
                            <td class="line-total fw-bold">0.00 ₺</td>
                            <td><button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove(); calcTotal();"><i class="bi bi-x"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="text-end mb-2">
                <strong>Toplam: <span id="grandTotal">0.00</span> ₺</strong>
            </div>
            <div class="d-flex gap-2">
                <a href="{{ url_for('purchase.invoice_list') }}" class="btn btn-outline-secondary">İptal</a>
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-save"></i> Faturayı Kaydet</button>
            </div>
        </form>
    </div>
</div>

<script>
function addRow() {
    var tbody = document.getElementById('itemsBody');
    var row = document.createElement('tr');
    row.innerHTML = `<td><select name="product_id[]" class="form-select form-select-sm" required>
        <option value="">- Seçin -</option>
        {% for p in products %}
        <option value="{{ p.id }}" data-price="{{ p.purchase_price }}">{{ p.name }} ({{ p.barcode }})</option>
        {% endfor %}
    </select></td>
    <td><input type="number" name="qty[]" class="form-control form-control-sm" value="1" min="0.01" step="0.01" onchange="calcRow(this)"></td>
    <td><input type="number" name="price[]" class="form-control form-control-sm" value="0" min="0" step="0.01" onchange="calcRow(this)"></td>
    <td class="line-total fw-bold">0.00 ₺</td>
    <td><button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove(); calcTotal();"><i class="bi bi-x"></i></button></td>`;
    tbody.appendChild(row);
}

function calcRow(el) {
    var tr = el.closest('tr');
    var qty = parseFloat(tr.querySelector('[name="qty[]"]').value) || 0;
    var price = parseFloat(tr.querySelector('[name="price[]"]').value) || 0;
    var total = qty * price;
    tr.querySelector('.line-total').textContent = total.toFixed(2) + ' ₺';
    calcTotal();
}

function calcTotal() {
    var totals = document.querySelectorAll('.line-total');
    var sum = 0;
    totals.forEach(function(el) { sum += parseFloat(el.textContent) || 0; });
    document.getElementById('grandTotal').textContent = sum.toFixed(2);
}

document.querySelectorAll('[name="product_id[]"]').forEach(function(sel) {
    sel.addEventListener('change', function() {
        var opt = this.options[this.selectedIndex];
        var price = opt.dataset.price;
        if (price && parseFloat(price) > 0) {
            var tr = this.closest('tr');
            tr.querySelector('[name="price[]"]').value = parseFloat(price).toFixed(2);
            calcRow(tr.querySelector('[name="price[]"]'));
        }
    });
});
</script>
{% endblock %}
