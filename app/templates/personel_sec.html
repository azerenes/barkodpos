<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarkodPOS - Giriş</title>
    <link href="{{ url_for('static', filename='lib/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='lib/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .secim-card { background: #fff; border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align:center; }
    </style>
</head>
<body>
    <div class="secim-card">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" style="width:80px;height:80px;margin-bottom:24px;">
            <rect x="8" y="8" width="104" height="104" rx="18" stroke="#1A1A1A" stroke-width="7"/>
            <line x1="35" y1="40" x2="85" y2="40" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>
            <path d="M35 40 L60 82" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round"/>
            <path d="M85 40 L60 82" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round"/>
            <circle cx="35" cy="40" r="9" fill="#1A1A1A"/>
            <circle cx="35" cy="40" r="3.5" fill="white" opacity="0.25"/>
            <circle cx="85" cy="40" r="9" fill="#1A1A1A"/>
            <circle cx="85" cy="40" r="3.5" fill="white" opacity="0.25"/>
            <circle cx="60" cy="82" r="9" fill="#DC2626"/>
            <circle cx="60" cy="82" r="3.5" fill="white" opacity="0.25"/>
        </svg>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{{ 'danger' if 'Hata' in msg or 'hatal' in msg or 'Hen' in msg else 'warning' }}">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" id="loginForm">
            <div class="mb-3">
                <select name="user_id" id="userSelect" class="form-select form-select-lg" required onchange="checkPassword()">
                    <option value="">-- Personel Seçin --</option>
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.full_name or u.username }}{% if u.role == 'admin' %} (Yönetici){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3" id="passwordGroup" style="display:none;">
                <input type="password" name="password" id="passwordInput" class="form-control form-control-lg" placeholder="Şifre" autocomplete="off">
            </div>
            <div class="mb-2" id="noPasswordInfo" style="display:none;">
                <small class="text-muted">Bu kullanıcının henüz şifresi yok, giriş yapınca belirleyebilirsiniz.</small>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-box-arrow-in-right"></i> Giriş
            </button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='lib/bootstrap.bundle.min.js') }}"></script>
    <script>
    function checkPassword() {
        var userId = document.getElementById('userSelect').value;
        var pwGroup = document.getElementById('passwordGroup');
        var noPwInfo = document.getElementById('noPasswordInfo');
        if (!userId) {
            pwGroup.style.display = 'none';
            noPwInfo.style.display = 'none';
            return;
        }
        fetch('/auth/check-password/' + userId)
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.exists) {
                    pwGroup.style.display = 'block';
                    noPwInfo.style.display = 'none';
                } else {
                    pwGroup.style.display = 'none';
                    noPwInfo.style.display = 'block';
                }
            })
            .catch(function() {
                pwGroup.style.display = 'none';
                noPwInfo.style.display = 'none';
            });
    }
    </script>
</body>
</html>
