<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarkodPOS - Şifre Belirle</title>
    <link href="{{ url_for('static', filename='lib/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='lib/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .secim-card { background: #fff; border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align:center; }
    </style>
</head>
<body>
    <div class="secim-card">
        <div class="mb-3">
            <i class="bi bi-shield-lock" style="font-size:48px;color:#0d6efd;"></i>
        </div>
        <h5 class="mb-1">Şifre Belirleyin</h5>
        <p class="text-muted small mb-3">İlk girişiniz. Lütfen bir şifre belirleyin.</p>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-danger">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Yeni şifre (en az 4 karakter)" required minlength="4" autocomplete="new-password">
            </div>
            <div class="mb-3">
                <input type="password" name="confirm" class="form-control form-control-lg" placeholder="Şifre tekrar" required minlength="4" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-check-lg"></i> Şifreyi Kaydet
            </button>
        </form>
    </div>
</body>
</html>
