{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-tags"></i> Kategoriler</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCategoryModal"><i class="bi bi-plus"></i> Kategori Ekle</button>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr><th>Kategori</th><th>Açıklama</th></tr></thead>
            <tbody>
                {% for cat in categories %}
                <tr><td>{{ cat.name }}</td><td>{{ cat.description or '-' }}</td></tr>
                {% else %}
                <tr><td colspan="2" class="text-center text-muted">Kategori yok</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="addCategoryModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="{{ url_for('stock.add_category') }}">
                <div class="modal-header"><h5>Yeni Kategori</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-2"><label>Kategori Adı</label><input type="text" name="name" class="form-control" required></div>
                    <div class="mb-2"><label>Açıklama</label><textarea name="description" class="form-control" rows="2"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Ekle</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
